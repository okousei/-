<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="images/icon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"
<title>佐能運輸有限会社
<link rel="icon" href="icon.png">
<style>
/* ブラウザが勝手に作る隙間をすべてゼロにする魔法のコード */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
}

/* バーの設定も念のため「左上ピッタリ」に固定 */
.navbar {
    position: fixed;
    top: 0;   /* 上端ピッタリ */
    left: 0;  /* 左端ピッタリ */
    width: 100%;
    /* ほか、背景色や高さの設定は今のままでOK */
}
/* ボタンのデザイン */
.header-link {
    color: white;
    text-decoration: none; /* 下線を消す */
    font-weight: bold;
    font-size: 0.9rem;
    padding: 10px 15px;
    border: 1px solid white;
    border-radius: 5px;
    transition: 0.3s;
}

/* マウスを乗せた時に色を反転させる */
.header-link:hover {
    background-color: white;
    color: #378be6;
}

/* 電話番号だけ少し目立たせる（任意） */
.tel {
    background-color: rgba(255, 255, 255, 0.2);
}
.nav-logo {
    height: 60px;
    width: auto;
}

/* ② 動かない背景画像 */
.top-view {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-image: url("images/bus.png");
    background-size: cover;
    background-position: center;
    z-index: 1; /* 一番奥 */
}

/* ③ 最初のクッキリ名言 */
.hero-message {
    height: 100vh;
    display: flex;
flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    position: relative;
    z-index: 3; /* ガラスより前 */
}

.hero-message h1 {
    font-size: 3.5rem;
    margin: 0;
}

/* ④ スクロールしてくる「すりガラス」の板 */
.main-content {
    position: relative;
    z-index: 10;
    /* ここを100vhにすると、最初の画面分は透明（写真が見える）になります */
    margin-top: 0; 
    
    background-color: rgba(255, 255, 255, 0.15); /* あの境界線の透明度 */
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    padding: 150px 10%;
    min-height: 200vh; /* スクロールできるように長く */
    color: #333;
    border-top: 1px solid rgba(255, 255, 255, 0.5);
}
</style>

</head>
<body>

<header class="navbar">
    <div class="logo-area">
        <img src="images/logo.png" alt="佐能運輸ロゴ" class="nav-logo">
    </div>

    <div class="header-info">
        <a href="https://maps.app.goo.gl/3qYxwfmBuW3uzbfp9" target="_blank" class="header-link">
            <span>📍 地図</span>
        </a>
        <a href="https://www.hellowork.careers/%E4%BD%90%E8%83%BD%E9%81%8B%E8%BC%B8%E6%9C%89%E9%99%90%E4%BC%9A%E7%A4%BE%E3%81%A7%E3%81%AE%E4%BD%9C%E6%A5%AD%E5%93%A1%EF%BC%8F%E9%85%8D%E5%90%88%E9%A3%BC%E6%96%99%E8%A3%BD%E9%80%A0%E3%81%AE%E3%83%8F%E3%83%AD%E3%83%BC%E3%83%AF%E3%83%BC%E3%82%AF%E6%B1%82%E4%BA%BA%E6%83%85%E5%A0%B1%EF%BC%88%E5%B2%A1%E5%B1%B1%E7%9C%8C%E4%BA%95%E5%8E%9F%E5%B8%82%EF%BC%89-%2033080-00332561/?utm_campaign=google_jobs_apply&utm_source=google_jobs_apply&utm_medium=organic" target="_blank" class="header-link">
            <span>🧑‍🏭求人情報</span>
        </a>
    </div>
</header>
<div class="top-view"></div>

<section class="hero-message">
    <h1>ブタさんのために運ぶ</h1>
　<h2><p>I love pig❤️</p></h2>
</section>

<main class="main-content">
    <h2>こんちは～佐能武司でー－－－す</h2>
    <p>佐能運輸たのしいよ～～～</p>
    <p>ねこが職場にいるよ～～</p>
　<p>うちにきてよ～～～</p>
</main>

</body>
